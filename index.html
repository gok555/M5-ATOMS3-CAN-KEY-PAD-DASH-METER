<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ワイヤレスCANブリッジ設定 Web版</title>
  <style>
    :root {
      --panel: #fffdfa;
      --line: #d6ccbc;
      --text: #2b241c;
      --muted: #6f6255;
      --accent: #005f73;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      font-family: "Yu Gothic UI", "BIZ UDPGothic", sans-serif;
      background: linear-gradient(180deg, #f4f1eb 0%, #e9e0d2 100%);
      color: var(--text);
    }

    .app {
      max-width: 1800px;
      margin: 0 auto;
      padding: 16px;
    }

    .header h1 {
      margin: 0 0 2px;
      font-size: 24px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar,
    .note,
    .guide,
    .status,
    .output {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(255, 253, 250, 0.9);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid #b9aa95;
      background: #fff8ee;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover {
      background: #f4eadb;
      border-color: #9b8a72;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    select,
    input,
    textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
    }

    select,
    input {
      padding: 9px 10px;
    }

    .columns {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 140px minmax(260px, 1fr) 140px minmax(260px, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .panel {
      min-width: 0;
      min-height: 580px;
      padding: 12px;
      background: rgba(255, 253, 250, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .id-list {
      width: 100%;
      min-height: 470px;
      padding: 8px;
      flex: 1;
    }

    .panel-actions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .output summary {
      cursor: pointer;
      font-weight: 700;
    }

    .output-buttons {
      display: flex;
      gap: 10px;
      margin: 10px 0 8px;
      flex-wrap: wrap;
    }

    #headerPreview {
      width: 100%;
      min-height: 100px;
      max-height: 180px;
      padding: 10px;
      resize: vertical;
    }

    .status {
      color: var(--accent);
      font-weight: 600;
    }

    @media (max-width: 980px) {
      .columns {
        grid-template-columns: 1fr;
      }

      .panel-actions {
        flex-direction: row;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>ワイヤレスCANブリッジ設定 Web版</h1>
        <p>ブラウザ上で ID 設定を編集し、JSON とヘッダを保存できます。</p>
      </div>
    </header>

    <section class="toolbar">
      <div class="toolbar-group">
        <button id="loadJsonButton">JSON読込</button>
        <button id="saveJsonButton">JSON保存</button>
        <button id="importTraceButton">実データ取込</button>
        <button id="addCustomIdButton">ID手入力</button>
        <button id="generateHeaderButton">ヘッダ生成</button>
        <button id="bleConnectButton">BLE接続</button>
        <button id="bleReadButton" disabled>M5読込</button>
        <button id="bleWriteButton" disabled>M5書込</button>
      </div>
      <div class="toolbar-group">
        <label>
          並び順
          <select id="sortMode">
            <option>ID順</option>
            <option>出現回数順</option>
            <option>推定周波数順</option>
          </select>
        </label>
        <label>
          取込対象
          <select id="importMode">
            <option>両方</option>
            <option>Rxのみ</option>
            <option>Txのみ</option>
          </select>
        </label>
      </div>
    </section>

    <section class="note">
      左は候補ID、中央は通すID、右は高優先IDです。実車やアナライザーのログを取り込んで、そのまま設定変更できます。
    </section>

    <section class="columns">
      <div class="panel">
        <div class="panel-title" id="availableTitle">候補ID</div>
        <div class="filter-row">
          <input id="availableFilter" type="text" placeholder="候補IDを検索">
          <button data-clear-target="availableFilter">クリア</button>
        </div>
        <select id="availableList" class="id-list" multiple></select>
      </div>

      <div class="panel-actions">
        <button id="toAllowButton">通すIDに追加 →</button>
        <button id="fromAllowButton">← 候補へ戻す</button>
      </div>

      <div class="panel">
        <div class="panel-title" id="allowTitle">通すID</div>
        <div class="filter-row">
          <input id="allowFilter" type="text" placeholder="通すIDを検索">
          <button data-clear-target="allowFilter">クリア</button>
        </div>
        <select id="allowList" class="id-list" multiple></select>
      </div>

      <div class="panel-actions">
        <button id="toHighButton">高優先にする →</button>
        <button id="fromHighButton">← 通すIDへ戻す</button>
      </div>

      <div class="panel">
        <div class="panel-title" id="highTitle">高優先ID</div>
        <div class="filter-row">
          <input id="highFilter" type="text" placeholder="高優先IDを検索">
          <button data-clear-target="highFilter">クリア</button>
        </div>
        <select id="highList" class="id-list" multiple></select>
      </div>
    </section>

    <details class="output">
      <summary>ヘッダ出力</summary>
      <div class="output-buttons">
        <button id="downloadAHeaderButton">A用ヘッダ保存</button>
        <button id="downloadBHeaderButton">B用ヘッダ保存</button>
      </div>
      <textarea id="headerPreview" readonly placeholder="ここに生成したヘッダの内容が表示されます。"></textarea>
    </details>

    <section class="guide">
      使い方: 1) 実データ取込 2) 候補IDを選ぶ 3) 通すIDに追加 4) 必要なら高優先にする 5) JSON保存またはヘッダ生成 6) Arduinoへ書き込み
    </section>

    <footer class="status" id="statusBar">準備完了</footer>

    <input id="jsonFileInput" type="file" accept=".json,application/json" hidden>
    <input id="traceFileInput" type="file" accept=".trace,.txt,.log,.csv" multiple hidden>
  </main>

  <script src="app.js?v=20260326d"></script>
</body>
</html>
